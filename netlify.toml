[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # bundle the MDE guide PDF alongside the email-sending function
  included_files = ["netlify/functions/*.pdf"]

# friendly API paths -> functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
